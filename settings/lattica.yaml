polygon:
  default_epoch_duration: 604800 # 7 days (seconds)
  resolution_cutoff_buffer: 14400

  # Interest rate
  # kinked curve: rate = base_rate + utilization * slope1  (below optimal)
  #               rate = base_rate + optimal * slope1 + (utilization - optimal) * slope2  (above optimal)
  interest_base_rate_bps: 50
  interest_optimal_utilization_bps: 8000
  interest_slope1_bps: 400
  interest_slope2_bps: 7500

  # PriceFeed config
  price_deviation_threshold_bps: 200 # push update when VWAP moves >2%
  price_staleness_limit: 3600 # price stale older than 1h
  circuit_breaker_threshold_bps: 3000 # >30% move in 10 min → pause

  dao: {}

amoy:
  default_epoch_duration: 3600
  resolution_cutoff_buffer: 600
  interest_base_rate_bps: 50
  interest_optimal_utilization_bps: 8000
  interest_slope1_bps: 400
  interest_slope2_bps: 7500
  price_deviation_threshold_bps: 200
  price_staleness_limit: 300
  circuit_breaker_threshold_bps: 3000
  dao: {}
