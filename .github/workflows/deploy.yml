name: deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  staging:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - run: uv sync --group deploy

      - uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: core-staging
          jwtGithubAudience: https://github.com/latticafi
          exportToken: true
          secrets: |
            secret/data/staging/core RPC_URL ;
            secret/data/staging/core CHAIN_ID ;
            secret/data/staging/core DEPLOYER_PRIVATE_KEY ;
            secret/data/staging/core PRICER_ADDRESS ;
            secret/data/staging/core ORACLE_SIGNER_ADDRESS ;
            secret/data/staging/core OPERATOR_ADDRESS ;

      - name: deploy
        run: uv run python deployments/deploy.py --mock-usdc
        env:
          RPC_URL: ${{ env.RPC_URL }}
          CHAIN_ID: ${{ env.CHAIN_ID }}
          DEPLOYER_PRIVATE_KEY: ${{ env.DEPLOYER_PRIVATE_KEY }}
          PRICER_ADDRESS: ${{ env.PRICER_ADDRESS }}
          ORACLE_SIGNER_ADDRESS: ${{ env.ORACLE_SIGNER_ADDRESS }}
          OPERATOR_ADDRESS: ${{ env.OPERATOR_ADDRESS }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          DEPLOY_ENV: staging

      - name: revoke token
        if: always()
        run: |
          curl -sS -X POST \
            -H "X-Vault-Token: ${VAULT_TOKEN}" \
            "${{ secrets.VAULT_ADDR }}/v1/auth/token/revoke-self" || true

  prod:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - run: uv sync --group deploy

      - uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: core-prod
          jwtGithubAudience: https://github.com/latticafi
          exportToken: true
          secrets: |
            secret/data/prod/core RPC_URL ;
            secret/data/prod/core CHAIN_ID ;
            secret/data/prod/core DEPLOYER_PRIVATE_KEY ;
            secret/data/prod/core PRICER_ADDRESS ;
            secret/data/prod/core ORACLE_SIGNER_ADDRESS ;
            secret/data/prod/core OPERATOR_ADDRESS ;
            secret/data/prod/core USDC_ADDRESS ;

      - name: deploy
        run: uv run python deployments/deploy.py
        env:
          RPC_URL: ${{ env.RPC_URL }}
          CHAIN_ID: ${{ env.CHAIN_ID }}
          DEPLOYER_PRIVATE_KEY: ${{ env.DEPLOYER_PRIVATE_KEY }}
          PRICER_ADDRESS: ${{ env.PRICER_ADDRESS }}
          ORACLE_SIGNER_ADDRESS: ${{ env.ORACLE_SIGNER_ADDRESS }}
          OPERATOR_ADDRESS: ${{ env.OPERATOR_ADDRESS }}
          USDC_ADDRESS: ${{ env.USDC_ADDRESS }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          DEPLOY_ENV: prod

      - name: revoke token
        if: always()
        run: |
          curl -sS -X POST \
            -H "X-Vault-Token: ${VAULT_TOKEN}" \
            "${{ secrets.VAULT_ADDR }}/v1/auth/token/revoke-self" || true
