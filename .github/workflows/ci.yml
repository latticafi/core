name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --group lint
      - name: Check formatting with mamushi
        run: uv run mamushi --check .
      - name: Lint with ruff
        run: uv run ruff check .

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --group test
      - run: uv run pytest --ignore=tests/test_fork.py -v

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, unit]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --group deploy

      - uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: core-staging
          jwtGithubAudience: https://github.com/latticafi
          exportToken: true
          secrets: |
            secret/data/staging/core RPC_URL ;
            secret/data/staging/core CHAIN_ID ;
            secret/data/staging/core DEPLOYER_PRIVATE_KEY ;
            secret/data/staging/core PRICER_ADDRESS ;
            secret/data/staging/core ORACLE_SIGNER_ADDRESS ;
            secret/data/staging/core OPERATOR_ADDRESS ;

      - name: Fork deploy
        run: uv run python deployments/deploy.py --dry-run --mock-usdc
        env:
          RPC_URL: ${{ env.RPC_URL }}
          CHAIN_ID: ${{ env.CHAIN_ID }}
          DEPLOYER_PRIVATE_KEY: ${{ env.DEPLOYER_PRIVATE_KEY }}
          PRICER_ADDRESS: ${{ env.PRICER_ADDRESS }}
          ORACLE_SIGNER_ADDRESS: ${{ env.ORACLE_SIGNER_ADDRESS }}
          OPERATOR_ADDRESS: ${{ env.OPERATOR_ADDRESS }}

      - name: Fork tests
        run: uv run pytest tests/test_fork.py -v
        env:
          RPC_URL: ${{ env.RPC_URL }}

      - name: revoke token
        if: always()
        run: |
          curl -sS -X POST \
            -H "X-Vault-Token: ${VAULT_TOKEN}" \
            "${{ secrets.VAULT_ADDR }}/v1/auth/token/revoke-self" || true
